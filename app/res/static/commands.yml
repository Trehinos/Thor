user/create:
  class: App\Commands\UserCommand
  command: createUser
  description: create a new user in DB
  arguments:
    username:
      hasValue: true
      description: user's login
    password:
      hasValue: true
      description: user's clear password. Will be hashed before insertion

user/list:
  class: App\Commands\UserCommand
  command: listUsers
  description: list all users in DB
  arguments:
    search:
      hasValue: true
      description: User login search request

user/edit:
  class: App\Commands\UserCommand
  command: editUser
  description: create a new user in DB
  arguments:
    pid:
      hasValue: true
      description: user's PID. Needed to identify the user in DB
    username:
      hasValue: true
      description: user's new login
    password:
      hasValue: true
      description: user's new clear password. Will be hashed before insertion

user/delete:
  class: App\Commands\UserCommand
  command: deleteUser
  description: delete an existing user in DB
  arguments:
    pid:
      hasValue: true
      description: user's PID. Needed to identify the user in DB

route/add:
  class: App\Commands\CoreCommand
  command: routeAdd
  description: add a route in app/res/routes.yml
  arguments:
    name:
      hasValue: true
      description: route identifier
    path:
      hasValue: true
      description: route PATH
    method:
      hasValue: true
      description: the request method GET, POST, ...

route/list:
  class: App\Commands\CoreCommand
  command: routeList
  description: list all routes in app/res/routes/yml