user/create:
  class: Thor\Api\Commands\UserCommand
  command: createUser
  description: create a new user in DB
  arguments:
    username:
      hasValue: true
      description: user's login
    password:
      hasValue: true
      description: user's clear password. Will be hashed before insertion

user/list:
  class: Thor\Api\Commands\UserCommand
  command: listUsers
  description: list all users in DB
  arguments:
    search:
      hasValue: true
      description: User login search request

user/edit:
  class: Thor\Api\Commands\UserCommand
  command: editUser
  description: create a new user in DB
  arguments:
    pid:
      hasValue: true
      description: user's PID. Needed to identify the user in DB
    username:
      hasValue: true
      description: user's new login
    password:
      hasValue: true
      description: user's new clear password. Will be hashed before insertion

user/delete:
  class: Thor\Api\Commands\UserCommand
  command: deleteUser
  description: delete an existing user in DB
  arguments:
    pid:
      hasValue: true
      description: user's PID. Needed to identify the user in DB

route/set:
  class: Thor\Api\Commands\CoreCommand
  command: routeSet
  description: add or edit a route in app/res/static/routes.yml
  arguments:
    name:
      hasValue: true
      description: route identifier
    path:
      hasValue: true
      description: route PATH
    method:
      hasValue: true
      description: the request method GET, POST, ...
    action-class:
      hasValue: true
      description: the controller class
    action-method:
      hasValue: true
      description: the controller method

route/list:
  class: Thor\Api\Commands\CoreCommand
  command: routeList
  description: list all routes in app/res/static/routes.yml

core/setup:
  class: Thor\Api\Commands\CoreCommand
  command: setup
  description: create the 'user' table and admin user

daemon/start:
  class: Thor\Api\Commands\DaemonCommand
  command: daemonStart
  description: start a daemon
  arguments:
    name:
      hasValue: true
      description: the daemon name


daemon/stop:
  class: Thor\Api\Commands\DaemonCommand
  command: daemonStop
  description: stop a daemon
  arguments:
    name:
      hasValue: true
      description: the daemon name

daemon/status:
  class: Thor\Api\Commands\DaemonCommand
  command: daemonStatus
  description: get the status of a daemon
  arguments:
    name:
      hasValue: true
      description: the daemon name
    all:
      hasValue: false
      description: if present, display all daemons status

daemon/reset:
  class: Thor\Api\Commands\DaemonCommand
  command: daemonReset
  description: reset the daemon state
  arguments:
    name:
      hasValue: true
      description: the daemon name

daemon/kill:
  class: Thor\Api\Commands\DaemonCommand
  command: daemonKill
  description: stop the daemon immediately
  arguments:
    name:
      hasValue: true
      description: the daemon name

clear/cache:
  class: ''
  command: ''
  description:
