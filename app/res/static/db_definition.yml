schema:
    -   name: default
        type: virtual
        columns:
            id: INT NOT NULL AUTO_INCREMENT
            public_id: VARCHAR(255) NOT NULL
        index:
            primary:
                id
            unique:
                - public_id

    -   extends: default
        name: user
        type: table
        columns:
            username: VARCHAR(255) NOT NULL
            password: VARCHAR(255) NOT NULL
        index:
            unique:
                - username

    -   name: permissions
        type: enumeration
        values:
            - OWNER_CREATE  1
            - OWNER_READ    2
            - OWNER_UPDATE  4
            - OWNER_DELETE  8
            - OWNER_LIST    16
            - GROUP_CREATE  32
            - GROUP_READ    64
            - GROUP_UPDATE  128
            - GROUP_DELETE  256
            - GROUP_LIST    512

    -   extends: default
        name: meta
        type: virtual
        columns:
            name: VARCHAR(255) NOT NULL
            created: DATETIME NOT NULL DEFAULT NOW()
            owner: FK:user.id
            modified: DATETIME DEFAULT NULL
            permissions: ENUM:permissions
        index:
            unique:
                - name
                - owner, created

    -   extends: meta
        name: account
        type: table
        columns:
            started: DATETIME NOT NULL DEFAULT NOW()
            startAmount: INT NOT NULL DEFAULT 0
            closed: DATETIME DEFAULT NULL
            closeAmount: INT DEFAULT NULL

    -   extends: meta
        name: account_line
        type: table
        columns:
            account: FK:account.id
            moved: DATETIME NOT NULL
            label: VARCHAR(255) NOT NULL
            amount: INT NOT NULL

