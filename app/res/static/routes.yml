# routename:
#       path: ...
#       parameters:
#           name:
#               regexp:
#               default:
#           ...
#  ...

# main routes
menu:
    action:
        class: Packages\EMS\Main\Actions\Main
        method: menu

index:
    path: "/"
    method: GET
    action:
        class: Packages\EMS\Main\Actions\Main
        method: index

changelog:
    path: "/changelog"
    method: GET
    action:
        class: Packages\EMS\Main\Actions\Main
        method: changelog

about:
    path: "/about"
    method: GET
    action:
        class: Packages\EMS\Main\Actions\Main
        method: about

legal:
    path: "/legal"
    method: GET
    action:
        class: Packages\EMS\Main\Actions\Main
        method: legal

create-admin:
    path: "/framework/create/admin"
    method: POST
    action:
        class: Packages\EMS\Main\Actions\Main
        method: createAdmin

generate-url:
    path: "/framework/generate-url"
    method: GET
    action:
        class: Packages\EMS\Main\Actions\Main
        method: generateUrlResponse

# users routes__________________________________________________________________________________________________________
users:
    path: "/users"
    method: GET
    action:
        class: Packages\EMS\Main\Actions\Users
        method: usersInterface

users-create-form:
    path: "/users/create/form"
    method: GET
    action:
        class: Packages\EMS\Main\Actions\Users
        method: createForm

users-create-action:
    path: "/users/create/action"
    method: POST
    action:
        class: Packages\EMS\Main\Actions\Users
        method: createAction

users-edit-form:
    path: "/users/$public_id/edit/form"
    method: GET
    parameters:
        public_id:
            regex: "[A-Za-z0-9-]+"
    action:
        class: Packages\EMS\Main\Actions\Users
        method: editForm

users-edit-action:
    path: "/users/$public_id/edit/action"
    method: POST
    parameters:
        public_id:
            regex: "[A-Za-z0-9-]+"
    action:
        class: Packages\EMS\Main\Actions\Users
        method: editAction

users-delete-action:
    path: "/users/$public_id/delete"
    method: POST
    parameters:
        public_id:
            regex: "[A-Za-z0-9-]+"
    action:
        class: Packages\EMS\Main\Actions\Users
        method: deleteAction
